# Pages 專案名 = 正式子網域(2026-07-17 站方定案:would-you-rather 子網域被佔,選用 -tw)。
name = "would-you-rather-tw"
compatibility_date = "2026-07-16"
pages_build_output_dir = "dist"

# D1 綁定。database_id 為正式庫(2026-07-17 `wrangler d1 create` 建立,region APAC)。
# --local 模式只用此 id 命名 .wrangler/state 內的本機 SQLite 檔(換 id 後本機空庫,
# 重跑 db:migrate + db:seed 即可),不會誤連正式庫;寫入正式庫一律要 --remote。
[[d1_databases]]
binding = "DB"
database_name = "would-you-rather-db"
database_id = "aadf5c61-a415-4eaa-a894-80de5e96c0d4"

# Phase 3:WAE 產品事件(quiz_start / question_answered / quiz_completed / share_clicked,
# functions/api/event.js)。本機 `wrangler pages dev` 在 local 模式下會提供這個 binding 的
# 模擬實作,不需要 Cloudflare 帳號即可開發與測試(已實測確認)。dataset 名稱 Phase 5 部署到
# 正式環境前需在 Cloudflare dashboard 建立同名 dataset,詳見 開發設計方針.md > Phase 3。
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "would_you_rather_events"
